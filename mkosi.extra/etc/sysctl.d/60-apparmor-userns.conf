# Ubuntu 24.04 enables AppArmor restrictions on unprivileged user namespaces
# by default. When Secure Boot is active the kernel enforces this more
# strictly, which prevents container runtimes (containerd, runc) from creating
# the namespaces they need. Disable the restriction.
#
# This is safe in our threat model: the image runs inside a TDX enclave with
# dm-verity on the root filesystem — there are no untrusted local users.
kernel.apparmor_restrict_unprivileged_userns=0
