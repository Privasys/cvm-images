name: Build NVIDIA CC Modules

on:
  push:
    tags:
      # Cut a versioned NVIDIA CC bundle release explicitly.
      - 'nvidia-cc-v*'
      # Lock-step with kernel ABI: every kernel-v* tag also rebuilds the
      # patched NVIDIA modules against THAT kernel and uploads the bundle
      # as a workflow artefact (no GitHub Release is cut for kernel-v*
      # triggers, only for explicit nvidia-cc-v* tags). The downstream
      # enclave-os-virtual image build picks up the artefact by kernel ABI,
      # so a kernel bump can never desync from the driver build.
      - 'kernel-v*'
  workflow_dispatch:
    inputs:
      kernel_tag:
        description: 'cvm-images kernel-v* release tag to build against (default: latest)'
        type: string
        default: ''

permissions:
  contents: write

jobs:
  build:
    name: Build TDX CC patched NVIDIA modules
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc
          df -h /

      - name: Install matching kernel headers from cvm-images kernel-v* release
        env:
          GH_TOKEN: ${{ github.token }}
          KERNEL_TAG_INPUT: ${{ github.event.inputs.kernel_tag }}
        run: |
          # The patched HWE kernel ABI must match the one shipped in the
          # most recent cvm-images kernel-v* release (or the tag specified
          # via workflow_dispatch). Downloading the .deb directly from that
          # release guarantees ABI lock-step with enclave-os-virtual images
          # which install the same .deb at build time.
          set -euo pipefail
          if [ -n "${KERNEL_TAG_INPUT:-}" ]; then
            KERNEL_TAG="$KERNEL_TAG_INPUT"
          elif [[ "${{ github.ref }}" == refs/tags/kernel-v* ]]; then
            # Lock-step rebuild: build against the kernel tag we were
            # triggered by. The kernel-v* release is published by the
            # build-kernel.yml workflow that runs concurrently; wait until
            # its assets are up.
            KERNEL_TAG="${{ github.ref_name }}"
            echo "Waiting for kernel release $KERNEL_TAG assets to be published"
            for i in $(seq 1 60); do
              if gh release view "$KERNEL_TAG" --repo "${{ github.repository }}" \
                  --json assets -q '.assets[].name' 2>/dev/null | grep -q linux-headers-; then
                break
              fi
              sleep 30
            done
          else
            KERNEL_TAG=$(gh release list --repo "${{ github.repository }}" \
              --json tagName -q '.[].tagName' | grep '^kernel-v' | head -1)
          fi
          if [ -z "$KERNEL_TAG" ]; then
            echo "::error::No kernel-v* release found in ${{ github.repository }}"
            exit 1
          fi
          echo "Using kernel release: $KERNEL_TAG"
          mkdir -p /tmp/kernel-debs
          gh release download "$KERNEL_TAG" --repo "${{ github.repository }}" \
            --pattern 'linux-headers-*.deb' \
            --dir /tmp/kernel-debs
          ls -lh /tmp/kernel-debs/
          # The per-flavor linux-headers-$KVER-generic.deb is just the
          # arch-specific overlay; it depends on linux-hwe-<series>-headers-$KVER
          # (the flavor-independent base headers) which is published in the
          # Ubuntu archive (build-kernel.sh in cvm-images doesn't currently
          # ship it; the upstream package satisfies the dep cleanly because
          # our BadAML patch only touches drivers/acpi/, not include/).
          KVER=$(basename /tmp/kernel-debs/linux-headers-*.deb | sed 's/^linux-headers-//; s/_.*//' | head -1)
          KABI="${KVER%-generic}"
          # Series is major.minor only (e.g. 7.0), not 7.0.3
          KSERIES=$(echo "$KABI" | cut -d. -f1-2)
          BASE_PKG="linux-hwe-${KSERIES}-headers-${KABI}"
          echo "Installing base headers package $BASE_PKG from Ubuntu archive"
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends "$BASE_PKG"
          sudo dpkg -i /tmp/kernel-debs/linux-headers-*.deb
          ls -d /usr/src/linux-headers-"$KVER" || { echo "::error::headers tree missing"; exit 1; }
          echo "KERNEL_VERSION_OVERRIDE=$KVER" >> "$GITHUB_ENV"
          echo "KERNEL_TAG=$KERNEL_TAG" >> "$GITHUB_ENV"
          echo "Resolved kernel version: $KVER"

      - name: Build patched modules
        run: |
          set -euo pipefail
          sudo -E ./build-nvidia-modules.sh --kernel-version "$KERNEL_VERSION_OVERRIDE" --output-dir "${{ github.workspace }}/nvidia-cc-bundle"
          {
            echo "### NVIDIA CC Module Bundle"
            echo "Built against cvm-images **$KERNEL_TAG** ($KERNEL_VERSION_OVERRIDE)"
            echo '```'
            cat nvidia-cc-bundle/BUILD-INFO
            echo
            ls -lh nvidia-cc-bundle/modules/*.ko
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: nvidia-cc-bundle
          path: |
            nvidia-cc-bundle*.tar.gz
            nvidia-cc-bundle/BUILD-INFO
          retention-days: 90

      # Only cut a GitHub Release on explicit nvidia-cc-v* tags.
      # Lock-step kernel-v* runs leave the bundle as a 90-day artefact
      # consumed by the enclave-os-virtual image build that pins the
      # same kernel.
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/nvidia-cc-v')
        uses: softprops/action-gh-release@v2
        with:
          files: nvidia-cc-bundle*.tar.gz
          generate_release_notes: true
