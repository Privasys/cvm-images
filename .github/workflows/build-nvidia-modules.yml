name: Build NVIDIA CC Modules

on:
  push:
    tags: ['nvidia-cc-v*']
  workflow_dispatch:
    inputs:
      kernel_version:
        description: 'Override kernel version (e.g. 6.17.0-20-generic). Empty = pick latest installed.'
        type: string
        default: ''

permissions:
  contents: write

jobs:
  build:
    name: Build TDX CC patched NVIDIA modules
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc
          df -h /

      - name: Install matching kernel headers (if kernel_version set)
        if: github.event.inputs.kernel_version != ''
        run: |
          KVER='${{ github.event.inputs.kernel_version }}'
          echo "Requested kernel: $KVER"
          # Mainline-PPA-style fetch from Ubuntu archive
          sudo apt-get update -qq
          sudo apt-get install -y "linux-headers-$KVER" || {
            echo "linux-headers-$KVER not available in default repo, trying generic-hwe-24.04-edge"
            sudo apt-get install -y linux-headers-generic-hwe-24.04-edge || true
            ls /usr/src/ | grep linux-headers
          }

      - name: Build patched modules
        env:
          KERNEL_VERSION_OVERRIDE: ${{ github.event.inputs.kernel_version }}
        run: |
          if [ -n "$KERNEL_VERSION_OVERRIDE" ]; then
            sudo -E ./build-nvidia-modules.sh --kernel-version "$KERNEL_VERSION_OVERRIDE" --output-dir "${{ github.workspace }}/nvidia-cc-bundle"
          else
            sudo -E ./build-nvidia-modules.sh --output-dir "${{ github.workspace }}/nvidia-cc-bundle"
          fi
          echo "### NVIDIA CC Module Bundle" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat nvidia-cc-bundle/BUILD-INFO >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          ls -lh nvidia-cc-bundle/modules/*.ko >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: nvidia-cc-bundle
          path: |
            nvidia-cc-bundle*.tar.gz
            nvidia-cc-bundle/BUILD-INFO
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/nvidia-cc-v')
        uses: softprops/action-gh-release@v2
        with:
          files: nvidia-cc-bundle*.tar.gz
          generate_release_notes: true
