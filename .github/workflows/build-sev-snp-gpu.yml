name: Build SEV-SNP GPU Image

on:
  push:
    branches: [main]
    tags: ['sev-snp-gpu-v*']
  pull_request:
    branches: [main]
    paths:
      - 'images/sev-snp-gpu/**'
      - 'common/**'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write   # Required for GCP Workload Identity Federation

env:
  GCP_PROJECT: ${{ vars.GCP_PROJECT }}
  GCS_BUCKET: ${{ vars.GCS_BUCKET || 'privasys-tdx-images' }}

jobs:
  build:
    name: Build SEV-SNP GPU image (${{ matrix.variant }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: generic
            mkosi_args: ''
            name_suffix: ''
          - variant: gcp
            mkosi_args: '--profile gcp'
            name_suffix: '-gcp'
          - variant: gcp-dev
            mkosi_args: '--profile gcp --profile dev'
            name_suffix: '-gcp-dev'
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get clean
          df -h /

      - name: Install mkosi
        run: |
          # Pinned to the v26 tag commit (tags are mutable, SHAs are not).
          sudo pip3 install git+https://github.com/systemd/mkosi.git@84af20892b61c8e177e391f997ded8b4cb5514f2 --break-system-packages

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            systemd-container bubblewrap \
            systemd-ukify systemd-boot-efi \
            mtools dosfstools e2fsprogs squashfs-tools \
            cryptsetup erofs-utils \
            pesign sbsigntool debootstrap systemd-boot

      - name: Recreate symlinks
        run: |
          # Git on the CI runner may check out symlink files as plain text.
          # Recreate them as real symlinks so mkosi overlays work correctly.
          cd common/mkosi.extra/etc/systemd/system

          for f in multi-user.target.wants/systemd-networkd.service \
                   sockets.target.wants/systemd-networkd.socket \
                   sysinit.target.wants/systemd-networkd-wait-online.service; do
            if [ -f "$f" ] && [ ! -L "$f" ]; then
              target=$(cat "$f")
              rm "$f"
              ln -s "$target" "$f"
            fi
          done

          cd ../../../../..
          f=common/mkosi.extra/etc/resolv.conf
          if [ -f "$f" ] && [ ! -L "$f" ]; then
            target=$(cat "$f")
            rm "$f"
            ln -s "$target" "$f"
          fi

          # GPU image NVIDIA service symlinks
          cd images/sev-snp-gpu/mkosi.extra/etc/systemd/system/multi-user.target.wants
          for f in nvidia-persistenced.service nvidia-fabricmanager.service; do
            if [ -f "$f" ] && [ ! -L "$f" ]; then
              target=$(cat "$f")
              rm "$f"
              ln -s "$target" "$f"
            fi
          done

      - name: Build image
        run: |
          cd images/sev-snp-gpu
          sudo mkosi ${{ matrix.mkosi_args }} build

      - name: Verify partitions
        run: |
          RAW=$(ls images/sev-snp-gpu/privasys-sev-snp-gpu*_*.raw)
          sudo fdisk -l "$RAW"
          echo "---"
          ls -lh "$RAW"

      - name: Verify production image has no SSH daemon
        if: matrix.variant != 'gcp-dev'
        run: |
          # The production image must not contain an interactive entry
          # point. Fail the build if sshd slipped in via a dependency.
          # Userspace check (dump.erofs) - no erofs kernel module needed.
          RAW=$(ls images/sev-snp-gpu/privasys-sev-snp-gpu*_*.raw)
          ROOT_GUID=4F68BCE3-E8CD-4DB1-96E7-FBCAF984B709
          read -r START SIZE <<< "$(sudo sfdisk --json "$RAW" \
            | jq -r --arg t "$ROOT_GUID" \
              '.partitiontable.partitions[] | select(.type==($t|ascii_upcase)) | "\(.start) \(.size)"' \
            | head -1)"
          sudo dd if="$RAW" of=/tmp/root.img bs=512 skip="$START" count="$SIZE" status=none
          if dump.erofs --ls --path=/usr/sbin /tmp/root.img | grep -qw sshd; then
            echo "::error::sshd found in production image"
            exit 1
          fi
          sudo rm -f /tmp/root.img
          echo "OK: no sshd in production image"

      - name: Package image
        if: startsWith(github.ref, 'refs/tags/sev-snp-gpu-v')
        run: |
          RAW=$(basename images/sev-snp-gpu/privasys-sev-snp-gpu*_*.raw)
          OUT=privasys-sev-snp-gpu${{ matrix.name_suffix }}-${{ github.ref_name }}.tar.zst
          tar --zstd -cf "$OUT" \
            --transform "s|$RAW|disk.raw|" \
            -C images/sev-snp-gpu "$RAW"
          sha256sum "$OUT" > "$OUT.sha256"
          ls -lh privasys-sev-snp-gpu${{ matrix.name_suffix }}-*.tar.zst*
          rm images/sev-snp-gpu/"$RAW"

      - name: Authenticate to GCP
        if: startsWith(github.ref, 'refs/tags/sev-snp-gpu-v')
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        continue-on-error: true
        id: gcp-auth
        with:
          workload_identity_provider: projects/${{ vars.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/${{ vars.GCP_WIF_POOL }}/providers/${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          project_id: ${{ vars.GCP_PROJECT }}

      - name: Upload to GCS
        if: startsWith(github.ref, 'refs/tags/sev-snp-gpu-v') && steps.gcp-auth.outcome == 'success'
        continue-on-error: true
        id: gcs-upload
        run: |
          gcloud storage cp privasys-sev-snp-gpu${{ matrix.name_suffix }}-*.tar.zst* gs://${{ env.GCS_BUCKET }}/
          echo "Uploaded to gs://${{ env.GCS_BUCKET }}/"

      - name: Warn if GCS upload was skipped
        if: startsWith(github.ref, 'refs/tags/sev-snp-gpu-v') && steps.gcs-upload.outcome != 'success'
        run: |
          echo "::warning::GCS upload failed or was skipped. The image was built but not uploaded to GCS. Fix the WIF IAM binding for Privasys/cvm-images."

      - name: Create GitHub Release
        if: always() && startsWith(github.ref, 'refs/tags/sev-snp-gpu-v') && matrix.variant == 'generic'
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          body: |
            ## SEV-SNP GPU Image ${{ github.ref_name }}

            Download from GCS:
            ```bash
            # Cloud-agnostic image
            gcloud storage cp gs://${{ env.GCS_BUCKET }}/privasys-sev-snp-gpu-${{ github.ref_name }}.tar.zst .

            # GCP image (includes google-compute-engine, google-guest-agent, oslogin)
            gcloud storage cp gs://${{ env.GCS_BUCKET }}/privasys-sev-snp-gpu-gcp-${{ github.ref_name }}.tar.zst .
            ```
          generate_release_notes: true
          make_latest: false
