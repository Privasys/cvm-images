name: Build TDX GPU Image

on:
  push:
    branches: [main]
    tags: ['tdx-gpu-v*']
  pull_request:
    branches: [main]
    paths:
      - 'images/tdx-gpu/**'
      - 'common/**'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write   # Required for GCP Workload Identity Federation

env:
  GCP_PROJECT: ${{ vars.GCP_PROJECT }}
  GCS_BUCKET: ${{ vars.GCS_BUCKET || 'privasys-tdx-images' }}

jobs:
  build:
    name: Build TDX GPU image (${{ matrix.variant }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: generic
            mkosi_args: ''
            name_suffix: ''
          - variant: gcp
            mkosi_args: '--profile gcp'
            name_suffix: '-gcp'
          - variant: gcp-dev
            mkosi_args: '--profile gcp --profile dev'
            name_suffix: '-gcp-dev'
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get clean
          df -h /

      - name: Install mkosi
        run: |
          # Pinned to the v26 tag commit (tags are mutable, SHAs are not).
          sudo pip3 install git+https://github.com/systemd/mkosi.git@84af20892b61c8e177e391f997ded8b4cb5514f2 --break-system-packages

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            systemd-container bubblewrap \
            systemd-ukify systemd-boot-efi \
            mtools dosfstools e2fsprogs squashfs-tools \
            cryptsetup erofs-utils \
            pesign sbsigntool debootstrap systemd-boot

      - name: Recreate symlinks
        run: |
          # Git on the CI runner may check out symlink files as plain text.
          # Recreate them as real symlinks so mkosi overlays work correctly.
          cd common/mkosi.extra/etc/systemd/system

          for f in multi-user.target.wants/systemd-networkd.service \
                   sockets.target.wants/systemd-networkd.socket \
                   sysinit.target.wants/systemd-networkd-wait-online.service; do
            if [ -f "$f" ] && [ ! -L "$f" ]; then
              target=$(cat "$f")
              rm "$f"
              ln -s "$target" "$f"
            fi
          done

          cd ../../../../..
          f=common/mkosi.extra/etc/resolv.conf
          if [ -f "$f" ] && [ ! -L "$f" ]; then
            target=$(cat "$f")
            rm "$f"
            ln -s "$target" "$f"
          fi

          # GPU image NVIDIA service symlinks
          cd images/tdx-gpu/mkosi.extra/etc/systemd/system/multi-user.target.wants
          for f in nvidia-persistenced.service; do
            if [ -f "$f" ] && [ ! -L "$f" ]; then
              target=$(cat "$f")
              rm "$f"
              ln -s "$target" "$f"
            fi
          done

      - name: Download patched CVM Guard kernel + signed NVIDIA CC bundle
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          KERNEL_TAG=$(gh release list --repo ${{ github.repository }} \
            --json tagName -q '.[].tagName' | grep '^kernel-v' | head -1)
          if [ -z "$KERNEL_TAG" ]; then
            echo "::error::No kernel-v* release found in ${{ github.repository }}"
            exit 1
          fi
          echo "Using kernel release $KERNEL_TAG"
          gh release download "$KERNEL_TAG" --repo ${{ github.repository }} \
            --pattern 'linux-*.deb' --dir images/tdx-gpu/kernel-debs
          rm -f images/tdx-gpu/kernel-debs/linux-headers-*.deb
          ls -lh images/tdx-gpu/kernel-debs/

          # Bake the SIGNED patched CC modules from the same release so the
          # module vermagic matches the kernel and the signature chains to
          # its builtin trusted keyring (module.sig_enforce=1).
          mkdir -p /tmp/nvcc
          gh release download "$KERNEL_TAG" --repo ${{ github.repository }} \
            --pattern 'nvidia-cc-bundle-signed-*.tar.gz' --dir /tmp/nvcc
          tar -xzf /tmp/nvcc/nvidia-cc-bundle-signed-*.tar.gz -C /tmp/nvcc
          KVER=$(grep '^kernel_version=' /tmp/nvcc/nvidia-cc-bundle/BUILD-INFO | cut -d= -f2)
          DEST="images/tdx-gpu/mkosi.extra.nvidia-cc/usr/lib/nvidia-cc/$KVER"
          mkdir -p "$DEST"
          cp -r /tmp/nvcc/nvidia-cc-bundle/modules "$DEST/"
          cp -r /tmp/nvcc/nvidia-cc-bundle/firmware "$DEST/"
          cp /tmp/nvcc/nvidia-cc-bundle/module-signing-cert.x509 "$DEST/"
          tail -c 100 "$DEST/modules/nvidia.ko" | grep -q "Module signature appended" \
            || { echo "::error::bundle modules are not signed"; exit 1; }
          echo "Baked signed CC bundle for kernel $KVER"

      - name: Build image
        run: |
          cd images/tdx-gpu
          sudo mkosi ${{ matrix.mkosi_args }} build

      - name: Verify partitions
        run: |
          RAW=$(ls images/tdx-gpu/privasys-tdx-gpu*_*.raw)
          sudo fdisk -l "$RAW"
          echo "---"
          ls -lh "$RAW"

      - name: Extract dm-verity root hash
        id: verity
        run: |
          # The root hash is the code-identity measurement of the rootfs:
          # it is baked into the kernel command line and measured into the
          # TEE at boot. Recompute it from the artifact (same salt and
          # block sizes as the superblock) and publish it with the image.
          RAW=$(ls images/tdx-gpu/privasys-tdx-gpu*_*.raw)
          LOOPDEV=$(sudo losetup --find --show --partscan "$RAW")
          sudo partprobe "$LOOPDEV" 2>/dev/null || true
          sleep 1
          VERITY_PART=""; DATA_PART=""
          for part in "${LOOPDEV}p"*; do
            TYPE=$(sudo blkid -o value -s TYPE "$part" 2>/dev/null || true)
            case "$TYPE" in
              DM_verity_hash) VERITY_PART="$part" ;;
              erofs)          DATA_PART="$part" ;;
            esac
          done
          [ -n "$VERITY_PART" ] && [ -n "$DATA_PART" ] || { echo "::error::verity or data partition not found"; sudo losetup -d "$LOOPDEV"; exit 1; }
          DUMP=$(sudo veritysetup dump "$VERITY_PART")
          SALT=$(echo "$DUMP" | grep 'Salt:' | awk '{print $NF}')
          DATA_BS=$(echo "$DUMP" | grep 'Data block size:' | awk '{print $NF}')
          HASH_BS=$(echo "$DUMP" | grep 'Hash block size:' | awk '{print $NF}')
          truncate -s 256M /tmp/verity-recompute.img
          ROOT_HASH=$(sudo veritysetup format "$DATA_PART" /tmp/verity-recompute.img \
            --data-block-size="$DATA_BS" --hash-block-size="$HASH_BS" \
            --salt="$SALT" --format=1 2>&1 | grep 'Root hash:' | awk '{print $NF}')
          rm -f /tmp/verity-recompute.img
          sudo losetup -d "$LOOPDEV"
          [ -n "$ROOT_HASH" ] || { echo "::error::failed to compute dm-verity root hash"; exit 1; }
          echo "root_hash=$ROOT_HASH" >> "$GITHUB_OUTPUT"
          { echo "### dm-verity root hash (${{ matrix.variant }})"; echo '```'; echo "$ROOT_HASH"; echo '```'; } >> "$GITHUB_STEP_SUMMARY"

      - name: Predict RTMR measurements
        id: rtmr
        run: |
          # Compute the expected TDX RTMR[1]/RTMR[2] values from the
          # artifact (GPT, shim/GRUB Authenticode, grub.cfg command
          # sequence, kernel, cmdline, initrds) so verifiers can pin
          # measurements without ever booting the image.
          RAW=$(ls images/tdx-gpu/privasys-tdx-gpu*_*.raw)
          sudo ./predict-measurements.sh "$RAW" rtmr.json | tee /tmp/rtmr.txt
          echo "rtmr1=$(awk '/RTMR\[1\]/ {print $3}' /tmp/rtmr.txt)" >> "$GITHUB_OUTPUT"
          echo "rtmr2=$(awk '/RTMR\[2\]/ {print $3}' /tmp/rtmr.txt)" >> "$GITHUB_OUTPUT"
          { echo "### Predicted RTMRs (${{ matrix.variant }})"; echo '```'; grep 'RTMR' /tmp/rtmr.txt; echo '```'; } >> "$GITHUB_STEP_SUMMARY"

      - name: Verify production image has no SSH daemon
        if: matrix.variant != 'gcp-dev'
        run: |
          # The production image must not contain an interactive entry
          # point. Fail the build if sshd slipped in via a dependency.
          # Userspace check (dump.erofs) - no erofs kernel module needed.
          RAW=$(ls images/tdx-gpu/privasys-tdx-gpu*_*.raw)
          ROOT_GUID=4F68BCE3-E8CD-4DB1-96E7-FBCAF984B709
          read -r START SIZE <<< "$(sudo sfdisk --json "$RAW" \
            | jq -r --arg t "$ROOT_GUID" \
              '.partitiontable.partitions[] | select(.type==($t|ascii_upcase)) | "\(.start) \(.size)"' \
            | head -1)"
          sudo dd if="$RAW" of=/tmp/root.img bs=512 skip="$START" count="$SIZE" status=none
          if dump.erofs --ls --path=/usr/sbin /tmp/root.img | grep -qw sshd; then
            echo "::error::sshd found in production image"
            exit 1
          fi
          sudo rm -f /tmp/root.img
          echo "OK: no sshd in production image"

      - name: Verify signed NVIDIA CC bundle is baked
        run: |
          # The signed module bundle must end up inside the measured rootfs
          # at /usr/lib/nvidia-cc/<kver>/ — a silently skipped ExtraTrees
          # leaves the image bootable but running unpatched modules.
          RAW=$(ls images/tdx-gpu/privasys-tdx-gpu*_*.raw)
          KVER=$(ls images/tdx-gpu/mkosi.extra.nvidia-cc/usr/lib/nvidia-cc/ | head -1)
          ROOT_GUID=4F68BCE3-E8CD-4DB1-96E7-FBCAF984B709
          read -r START SIZE <<< "$(sudo sfdisk --json "$RAW" \
            | jq -r --arg t "$ROOT_GUID" \
              '.partitiontable.partitions[] | select(.type==($t|ascii_upcase)) | "\(.start) \(.size)"' \
            | head -1)"
          sudo dd if="$RAW" of=/tmp/root.img bs=512 skip="$START" count="$SIZE" status=none
          if ! dump.erofs --ls --path="/usr/lib/nvidia-cc/$KVER/modules" /tmp/root.img | grep -qw nvidia.ko; then
            echo "::error::signed NVIDIA CC bundle missing from image (/usr/lib/nvidia-cc/$KVER)"
            sudo rm -f /tmp/root.img
            exit 1
          fi
          sudo rm -f /tmp/root.img
          echo "OK: signed NVIDIA CC bundle present at /usr/lib/nvidia-cc/$KVER"

      - name: Package image
        if: startsWith(github.ref, 'refs/tags/tdx-gpu-')
        run: |
          RAW=$(basename images/tdx-gpu/privasys-tdx-gpu*_*.raw)
          OUT=privasys-tdx-gpu${{ matrix.name_suffix }}-${{ github.ref_name }}.tar.zst
          tar --zstd -cf "$OUT" \
            --transform "s|$RAW|disk.raw|" \
            -C images/tdx-gpu "$RAW"
          sha256sum "$OUT" > "$OUT.sha256"
          echo "${{ steps.verity.outputs.root_hash }}" > "$OUT.roothash"
          cp rtmr.json "$OUT.measurements.json"
          ls -lh privasys-tdx-gpu${{ matrix.name_suffix }}-*.tar.zst*
          rm images/tdx-gpu/"$RAW"

      - name: Authenticate to GCP
        if: startsWith(github.ref, 'refs/tags/tdx-gpu-')
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        continue-on-error: true
        id: gcp-auth
        with:
          workload_identity_provider: projects/${{ vars.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/${{ vars.GCP_WIF_POOL }}/providers/${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          project_id: ${{ vars.GCP_PROJECT }}

      - name: Upload to GCS
        if: startsWith(github.ref, 'refs/tags/tdx-gpu-') && steps.gcp-auth.outcome == 'success'
        continue-on-error: true
        id: gcs-upload
        run: |
          gcloud storage cp privasys-tdx-gpu${{ matrix.name_suffix }}-*.tar.zst* gs://${{ env.GCS_BUCKET }}/
          echo "Uploaded to gs://${{ env.GCS_BUCKET }}/"

      - name: Warn if GCS upload was skipped
        if: startsWith(github.ref, 'refs/tags/tdx-gpu-') && steps.gcs-upload.outcome != 'success'
        run: |
          echo "::warning::GCS upload failed or was skipped. The image was built but not uploaded to GCS. Fix the WIF IAM binding for Privasys/cvm-images."

      - name: Create GitHub Release
        if: always() && startsWith(github.ref, 'refs/tags/tdx-gpu-') && matrix.variant == 'generic'
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          files: |
            privasys-tdx-gpu-*.tar.zst.sha256
            privasys-tdx-gpu-*.tar.zst.roothash
            privasys-tdx-gpu-*.tar.zst.measurements.json
          body: |
            ## TDX GPU Image ${{ github.ref_name }}

            ## Measurements (generic variant)

            | Measurement | Value |
            |-------------|-------|
            | **dm-verity root hash** | `${{ steps.verity.outputs.root_hash }}` |
            | **Predicted RTMR[1]** | `${{ steps.rtmr.outputs.rtmr1 }}` |
            | **Predicted RTMR[2]** | `${{ steps.rtmr.outputs.rtmr2 }}` |

            The root hash covers every byte of the read-only rootfs; it is on
            the kernel command line and measured into the TEE at boot. The
            RTMR values are computed from the artifact by
            `predict-measurements.py` (GPT, shim/GRUB Authenticode, grub.cfg
            command sequence, kernel, cmdline, initrds); the per-event
            manifest is in the `.measurements.json` asset. Each variant's
            measurements are published next to its artifact in GCS.

            Download from GCS:
            ```bash
            # Cloud-agnostic image
            gcloud storage cp gs://${{ env.GCS_BUCKET }}/privasys-tdx-gpu-${{ github.ref_name }}.tar.zst .

            # GCP image (includes google-compute-engine, google-guest-agent, oslogin)
            gcloud storage cp gs://${{ env.GCS_BUCKET }}/privasys-tdx-gpu-gcp-${{ github.ref_name }}.tar.zst .
            ```
          generate_release_notes: true
          make_latest: false
