[Distribution]
Distribution=ubuntu
Release=noble
Repositories=universe,restricted,multiverse

[Output]
Format=disk
ImageId=privasys-tdx-gpu
ImageVersion=0.1.0
CompressOutput=false
RepartOffline=no

[Content]
ExtraTrees=../../common/mkosi.extra/
PackageManagerTrees=mkosi.pkgmanager
PrepareScripts=mkosi.prepare
Packages=
    # Core system
    systemd
    systemd-resolved
    udev
    dbus
    util-linux
    bash
    less
    vim-tiny
    iproute2
    iputils-ping

    # Disk encryption (for the data partition)
    cryptsetup
    clevis
    clevis-luks
    clevis-systemd
    tpm2-tools
    libtss2-tcti-device0

    # Kernel - HWE (Hardware Enablement), cloud-agnostic.
    # TDX guest support included since 6.2. The HWE meta-package
    # tracks the latest LTS-backported kernel on Noble.
    linux-image-generic-hwe-24.04

    # -- NVIDIA Confidential Computing (TDX + H100) --

    # Pre-built Canonical-signed OPEN SERVER kernel modules for nvidia-595.
    # The "server-open" variant is required for Confidential Computing
    # (CC) mode on datacenter GPUs (H100, A100, etc.) in TDX/SEV-SNP
    # VMs.  Built from nvidia-graphics-drivers-595-server (separate
    # source package from the desktop nvidia-graphics-drivers-595), it
    # includes GSP firmware and PCI ID support for GH100 and CC mode.
    #
    # Migrated 590 -> 595.58.03 on 2026-05-03 because Ubuntu turned the
    # 590-server packages into transition shims requiring 595.
    linux-modules-nvidia-595-server-open-generic-hwe-24.04

    # NVIDIA userspace, trimmed to the minimum a confidential GPU host
    # needs. The `nvidia-driver-595-server-open` meta-package pulls in
    # display/encode userspace (libnvidia-{decode,encode,fbc,gl,...},
    # nvidia-settings, xserver-xorg-video-nvidia) that never runs in a
    # headless CVM. Kept:
    #   - nvidia-utils-595-server: nvidia-smi
    #   - libnvidia-compute-595-server: libcuda.so.1, libnvidia-ml.so.1,
    #     libnvidia-nvvm, libnvidia-ptxjitcompiler
    nvidia-utils-595-server
    libnvidia-compute-595-server

    # NVIDIA container runtime integration for containerd/Docker.
    # Provides nvidia-container-runtime-hook and libnvidia-container.
    nvidia-container-toolkit

    # No CUDA toolkit on the host. Inference runtimes (vLLM) ship their
    # own CUDA runtime inside the workload container; the host only needs
    # libcuda.so from libnvidia-compute above. Keeps the image ~10 GB
    # smaller and the TCB tighter.

    # SSH and debugging tools are NOT part of the production image.
    # Build with `--profile dev` to add them (see mkosi.profiles/dev/).

RemoveFiles=
    /var/cache
    /var/log/journal
    /usr/share/man
    /usr/share/doc
    /usr/share/info
    /usr/share/locale

Locale=en_GB.UTF-8
Timezone=UTC
Hostname=privasys-tdx-gpu

[Validation]
Verity=hash
