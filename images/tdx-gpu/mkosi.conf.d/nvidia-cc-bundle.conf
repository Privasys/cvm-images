[Match]
# Relative paths in mkosi.conf.d/ dropins resolve against the image
# config root (where mkosi.conf lives), NOT this directory.
PathExists=mkosi.extra.nvidia-cc

[Content]
# Signed, patched NVIDIA CC modules baked at /usr/lib/nvidia-cc/<kver>/
# for cvm-runtime-init to load at boot. The tree is populated by CI (or
# a local build script) from the nvidia-cc-bundle-signed-* artifact of
# the same kernel-v* release that provides kernel-debs/, so the module
# vermagic always matches the running kernel and the signature chains to
# the kernel's builtin trusted keyring (required by module.sig_enforce=1).
ExtraTrees=mkosi.extra.nvidia-cc/
