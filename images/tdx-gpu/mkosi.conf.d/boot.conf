[Content]
Packages=
    # Secure Boot chain: shim-signed (Microsoft-signed) -> grubx64.efi
    # (Canonical-signed). mkosi uses these pre-signed binaries directly,
    # skipping grub-mkimage entirely. This gives:
    #   UEFI Secure Boot -> shimx64.efi -> grubx64.efi -> kernel
    grub-efi-amd64-signed
    shim-signed

Bootable=enabled
Bootloader=grub
ShimBootloader=signed

KernelCommandLine=
    console=ttyS0,115200n8
    iommu=pt
    intel_iommu=on
    nvidia.NVreg_ConfidentialComputing=1
    lockdown=integrity
    module.sig_enforce=1
    acpi_no_initrd_table_override
    # lockdown + sig_enforce work with the runtime-loaded patched NVIDIA
    # CC modules because the nvidia-cc bundle baked at
    # /usr/lib/nvidia-cc/$(uname -r)/modules/ is signed with the same
    # ephemeral key whose certificate the kernel-v* build embedded in its
    # builtin trusted keyring (see build-kernel.yml). The bundle and the
    # kernel debs MUST come from the same kernel-v* release.
