[Match]
Profiles=!dev

[Content]
# google-guest-agent hard-depends on google-compute-engine-oslogin which
# hard-depends on openssh-server, so the SSH daemon lands in the GCP
# image even though we never asked for it. Production images must have
# no interactive entry point: strip the server binaries, units, and
# config so there is nothing to start. (Dev builds skip this dropin and
# keep the full SSH stack.)
RemoveFiles=
    /usr/sbin/sshd
    /usr/lib/openssh/sshd-session
    /usr/lib/openssh/sshd-auth
    /usr/lib/openssh/sftp-server
    /usr/lib/systemd/system/ssh.service
    /usr/lib/systemd/system/ssh.socket
    /usr/lib/systemd/system/ssh@.service
    /usr/lib/systemd/system/sshd-keygen@.service
    /etc/ssh/sshd_config
    /etc/ssh/sshd_config.d
