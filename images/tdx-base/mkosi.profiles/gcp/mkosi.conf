[Content]
# GCP guest agent only: metadata, startup scripts, network glue.
# google-compute-engine and google-compute-engine-oslogin are SSH key
# provisioning machinery (and pull in openssh-server as a dependency) -
# production images have no SSH daemon, so they live in the dev dropin
# (mkosi.conf.d/dev-ssh.conf) and are only installed when the dev
# profile is also enabled.
Packages=
    google-guest-agent

ExtraTrees=../../../../common/mkosi.extra.gcp/
