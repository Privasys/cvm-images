[Distribution]
Distribution=ubuntu
Release=noble
Repositories=universe,restricted,multiverse

[Output]
Format=disk
ImageId=privasys-sev-snp-gpu
ImageVersion=0.1.0
CompressOutput=false
RepartOffline=no

[Content]
ExtraTrees=../../common/mkosi.extra/
PackageManagerTrees=mkosi.pkgmanager
PrepareScripts=mkosi.prepare
Packages=
    # Core system
    systemd
    systemd-resolved
    udev
    dbus
    util-linux
    bash
    less
    vim-tiny
    iproute2
    iputils-ping

    # Disk encryption (for the data partition)
    cryptsetup
    clevis
    clevis-luks
    clevis-systemd
    tpm2-tools
    libtss2-tcti-device0

    # Kernel - HWE (Hardware Enablement) 7.0, cloud-agnostic.
    linux-image-generic-hwe-24.04

    # ── NVIDIA Confidential Computing ──

    # Pre-built Canonical-signed OPEN SERVER kernel modules. CC mode on
    # datacenter GPUs (H100) requires the open kernel modules; the
    # proprietary desktop driver does not support CC and its DKMS-built
    # modules are unsigned, so they would be rejected by
    # module.sig_enforce=1. Same stack as tdx-gpu.
    linux-modules-nvidia-595-server-open-generic-hwe-24.04

    # NVIDIA userspace, trimmed to the minimum a confidential GPU host
    # needs (see tdx-gpu/mkosi.conf for the rationale).
    nvidia-utils-595-server
    libnvidia-compute-595-server

    # NVLink fabric manager for multi-GPU (A3 / H100 SXM) topologies.
    nvidia-fabricmanager-595

    # NVIDIA container runtime integration for containerd/Docker.
    # Provides nvidia-container-runtime-hook and libnvidia-container.
    nvidia-container-toolkit

    # No CUDA toolkit on the host. Inference runtimes ship their own CUDA
    # runtime inside the workload container; the host only needs
    # libcuda.so from libnvidia-compute above.

    # SSH and debugging tools are NOT part of the production image.
    # Build with `--profile dev` to add them (see mkosi.profiles/dev/).

RemoveFiles=
    /var/cache
    /var/log/journal
    /usr/share/man
    /usr/share/doc
    /usr/share/info
    /usr/share/locale

Locale=en_GB.UTF-8
Timezone=UTC
Hostname=privasys-sev-snp-gpu

[Validation]
Verity=hash
