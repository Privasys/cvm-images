[Output]
ImageId=privasys-sev-snp-gpu-dev

[Content]
# Overrides /etc/privasys/image-profile to "dev" - the marker is part of
# the measured rootfs, so dev images are attestably distinct.
ExtraTrees=../../../../common/mkosi.extra.dev/

# Development/debug builds ONLY. Production images contain no SSH daemon
# and no interactive entry point: every code path that can execute in a
# production CVM must be measured at build time, and a runtime shell
# would break that guarantee. Workloads are deployed and managed through
# Enclave OS Virtual over the attested API.
Packages=
    # Interactive access
    openssh-server
    openssh-client

    # Debugging tools
    strace
    tcpdump
    curl
    jq
