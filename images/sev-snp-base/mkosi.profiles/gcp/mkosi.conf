[Content]
# GCP guest agent: metadata, startup scripts, network glue.
# Its dependency chain (-> google-compute-engine-oslogin -> openssh-server)
# unavoidably installs the SSH daemon, so the prod-no-sshd.conf dropin
# strips the sshd binaries/units/config again unless the dev profile is
# enabled. google-compute-engine (extra GCE config + SSH key machinery)
# is dev-only via mkosi.conf.d/dev-ssh.conf.
Packages=
    google-guest-agent

ExtraTrees=../../../../common/mkosi.extra.gcp/
