[Distribution]
Distribution=ubuntu
Release=noble
Repositories=universe
# Freeze the apt universe to a dated snapshot so two builds of the same
# commit see identical package versions (reproducibility prerequisite).
# Bump deliberately to take security updates; never build from the
# moving archive.
Mirror=https://snapshot.ubuntu.com/ubuntu/20260611T000000Z

[Output]
Format=disk
ImageId=privasys-sev-snp-base
ImageVersion=0.1.0
CompressOutput=false

[Content]
ExtraTrees=../../common/mkosi.extra/
PackageManagerTrees=mkosi.pkgmanager
Packages=
    # Core system
    systemd
    systemd-resolved
    udev
    dbus
    util-linux
    bash
    less
    vim-tiny
    iproute2
    iputils-ping

    # Disk encryption (for the data partition)
    cryptsetup
    clevis
    clevis-luks
    clevis-systemd
    tpm2-tools
    libtss2-tcti-device0

    # Kernel - CVM Guard patched Ubuntu HWE (BadAML mitigation), ABI-pinned.
    # Pre-built .debs from the Privasys/cvm-images kernel-v* GitHub release
    # are staged into kernel-debs/ before the build (CI does this
    # automatically; for local builds run:
    #   gh release download kernel-v0.4.0 -R Privasys/cvm-images \
    #     --pattern 'linux-*.deb' --dir kernel-debs).
    # The stock linux-image-generic-hwe-24.04 is NOT used: it lacks the
    # CVM guard. The kernel is unsigned - boot integrity comes from TEE
    # measured boot, not UEFI Secure Boot (see docs/security.md).
    # The CVM guard covers SEV-SNP as well as TDX (sev_snp_enc_status_changed).
    linux-image-unsigned-6.17.0-35-generic
    linux-modules-6.17.0-35-generic
    linux-modules-extra-6.17.0-35-generic

    # SSH and debugging tools are NOT part of the production image.
    # Build with `--profile dev` to add them (see mkosi.profiles/dev/).

PackageDirectories=kernel-debs

RemoveFiles=
    /var/cache
    /var/log/journal
    /usr/share/man
    /usr/share/doc
    /usr/share/info
    /usr/share/locale

Locale=en_GB.UTF-8
Timezone=UTC
Hostname=privasys-sev-snp

[Validation]
Verity=hash
